name: Uni-Ask Hunter Bot

on:
  schedule:
    - cron: '*/10 * * * *'  # 每 10 分鐘自動執行一次 (UTC 時間)
  workflow_dispatch:        # 讓你可以手動按按鈕測試執行

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 📝 讀取程式碼
      uses: actions/checkout@v4

    - name: ⚙️ 設定 .NET 環境
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: 🚀 執行獵人程式
      env:
        # 這裡會從你設定的 Secrets 抓取 LINE Token
LINE_TOKEN: ${{ secrets.LINE_TOKEN }}      # 這行是關鍵！
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}  # 這行也是！
      run: dotnet run
